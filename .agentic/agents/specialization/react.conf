# React specialization rules
# Matches: Next.js, Create React App, Vite+React, bare React
detect_files=next.config.js,next.config.mjs,next.config.ts
detect_package=react
detect_label=React

# implementation-agent overrides
implementation.purpose_suffix=for React/TypeScript applications
implementation.key_dirs=src/components/,src/hooks/,src/pages/,src/app/
